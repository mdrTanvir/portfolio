version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nuxt:
        patterns:
          - nuxt
          - "@nuxt/*"
          - "@nuxtjs/*"
      vercel:
        patterns:
          - "@vercel/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
